name: Backend SonarQube Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup backend test structure
        run: |
          mkdir -p tests
          touch tests/__init__.py
          if [ -f test_app.py ]; then
            mv test_app.py tests/
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Create sonar-project.properties
        run: |
          cat > sonar-project.properties << EOF
sonar.organization=${{ secrets.SONAR_ORGANIZATION }}
sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }}
sonar.projectName=LMS Backend (Flask)
sonar.sources=.
sonar.tests=tests
sonar.exclusions=**/tests/**,**/coverage/**,**/__pycache__/**
sonar.test.inclusions=**/test_*.py
sonar.python.coverage.reportPaths=coverage.xml
sonar.sourceEncoding=UTF-8
sonar.python.version=3.10
EOF

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
