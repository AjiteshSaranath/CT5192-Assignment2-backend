name: Backend Security Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  # ── SNYK: Dependency & Code Vulnerability Scanning ──────────────
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true  # Don't block pipeline; report only

  # ── SonarQube: Static Code Analysis ─────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # Full history for accurate blame/diff

      # ── Setup test directory structure expected by SonarQube ──
      - name: Setup backend test structure
        run: |
          mkdir -p tests
          touch tests/__init__.py
          # Move test file to tests/ folder if not already there
          if [ -f test_app.py ]; then
            mv test_app.py tests/
          fi

      # ── Run tests with coverage so SonarQube gets coverage data ──
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      # ── Write sonar-project.properties with secrets ──────────
      - name: Create sonar-project.properties
        run: |
          cat > sonar-project.properties << 'EOF'
          sonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }}
          sonar.projectName=LMS Backend (Flask)
          sonar.sources=.
          sonar.tests=tests
          sonar.exclusions=**/tests/**,**/coverage/**,**/__pycache__/**
          sonar.test.inclusions=**/test_*.py
          sonar.python.coverage.reportPaths=coverage.xml
          sonar.sourceEncoding=UTF-8
          sonar.python.version=3.10
          EOF

      # ── Run SonarCloud scanner ────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
